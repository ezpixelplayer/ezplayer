# Logical-root map: the ONLY file that knows where things physically live.
#
# This default lives in the PUBLIC repo. A private repo ships its own
# roots.yaml (pass it with --roots) that ADDS a `private:` fragment root
# and a `mocassets:` asset root pointing back here via a sibling checkout,
# e.g.   shared: ../../ezplayer/doc/slides/fragments/shared
#
# All paths are resolved relative to THIS file's directory.

# Fragment roots: a manifest entry "shared/intro.md" -> <shared root>/intro.md
fragments:
    shared: ../fragments/shared
    dev: ../fragments/dev

# Asset namespaces: each is copied into the build dir under its own name,
# so /assets and /mocassets coexist no matter which repo they came from.
# Fragments reference them relatively, e.g. ![](assets/diagrams/arch-simple.svg)
assets:
    assets: ../../assets

# Where marp themes (CSS with `/* @theme <name> */`) are registered from.
themes:
    dir: ./themes
