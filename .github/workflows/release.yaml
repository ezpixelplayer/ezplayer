name: Build & Release EZPlayer

permissions:
    contents: write

on:
    push:
        tags:
            - 'v*.*.*' # e.g. v1.0.0
            - 'v*.*.*-*'
    workflow_dispatch: # allow manual runs (build-only; no release unless a tag triggered it)

jobs:
    # Build each platform's artifacts WITHOUT publishing. Every job auto-publishing
    # concurrently is what produced duplicate GitHub releases (electron-builder's
    # find-or-create-release races across the matrix). Here jobs only upload their output
    # as workflow artifacts; the single `release` job below assembles one release.
    build:
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-2022, macos-latest]

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            # Use Python 3.11 to satisfy node-gyp/gyp's distutils import
            - name: Set up Python
              if: matrix.os != 'ubuntu-latest'
              uses: actions/setup-python@v6
              with:
                  python-version: '3.11'

            - name: Set Python for node-gyp (unix)
              if: matrix.os == 'macos-latest'
              run: |
                  python --version
                  echo "PYTHON=$(which python)" >> $GITHUB_ENV

            - name: Set Python for node-gyp (windows)
              if: matrix.os == 'windows-2022'
              run: |
                  python --version
                  echo "PYTHON=$(where python | head -1)" >> $GITHUB_ENV

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Set up pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 10
                  run_install: false
                  cache: true

            - name: Install dependencies (workspace root)
              run: pnpm install --frozen-lockfile

            # The app's `build` runs `electron-builder --publish never` (see package.json),
            # so this produces installers + auto-update metadata (latest*.yml) but uploads
            # nothing. The depaudit gate also runs here, so a bad bundle fails before release.
            - name: Build app (no publish)
              run: pnpm run build

            - name: Upload platform artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: release-${{ matrix.os }}
                  if-no-files-found: error
                  retention-days: 5
                  path: |
                      apps/ezplayer-ui-electron/release/*.exe
                      apps/ezplayer-ui-electron/release/*.exe.blockmap
                      apps/ezplayer-ui-electron/release/*.dmg
                      apps/ezplayer-ui-electron/release/*.dmg.blockmap
                      apps/ezplayer-ui-electron/release/*.zip
                      apps/ezplayer-ui-electron/release/*.AppImage
                      apps/ezplayer-ui-electron/release/*.deb
                      apps/ezplayer-ui-electron/release/*.tar.gz
                      apps/ezplayer-ui-electron/release/*.yml

    # 64-bit Raspberry Pi (4/5) build on the lab's self-hosted ARM64 runner.
    # Only this workflow (tag push / workflow_dispatch — maintainer-controlled)
    # targets a self-hosted runner; the PR-triggered workflows use GitHub-hosted
    # runners, so untrusted fork code never runs on the lab hardware.
    build-pi:
        runs-on: [self-hosted, ARM64]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Set up pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 10
                  run_install: false
                  cache: true

            - name: Install dependencies (workspace root)
              run: pnpm install --frozen-lockfile

            - name: Build app (no publish)
              run: pnpm run build

            - name: Upload Pi arm64 artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: release-linux-arm64
                  if-no-files-found: error
                  retention-days: 5
                  path: |
                      apps/ezplayer-ui-electron/release/*-arm64.AppImage
                      apps/ezplayer-ui-electron/release/*_arm64.deb
                      apps/ezplayer-ui-electron/release/latest-linux-arm64.yml

    # Assemble ONE prerelease from all platforms. Only runs for tag pushes; a
    # workflow_dispatch on a branch builds (above) but does not release.
    release:
        needs: [build, build-pi]
        if: startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest

        steps:
            - name: Download all platform artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist-artifacts
                  merge-multiple: true # flatten all release-* artifacts into one dir

            - name: Publish single GitHub prerelease
              uses: softprops/action-gh-release@v2
              with:
                  prerelease: true
                  fail_on_unmatched_files: true
                  files: dist-artifacts/**/*
