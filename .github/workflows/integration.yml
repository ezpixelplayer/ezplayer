name: Integration Tests

# Full-stack tests: build the app, launch headless EZPlayer instances, drive
# them over the FPP-compat API, and verify DDP output at a mock controller.
# Heavier than the unit workflow (full install incl. node-gyp, app build,
# Electron download), so nightly + on-demand rather than per-PR.

on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * *' # daily, 08:17 UTC

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Electron runtime binary
        # pnpm 10 blocks dependency postinstall scripts; the harness needs
        # the real binary (electron-builder is not involved here).
        run: cd apps/ezplayer-ui-electron && node node_modules/electron/install.js

      - name: Build workspace packages
        run: pnpm --filter './packages/*' build

      - name: Build app main process
        run: pnpm --filter ezplayer-ui-electron build:tsc

      - name: Run app unit tests
        run: pnpm --filter ezplayer-ui-electron test

      - name: Run integration tests
        run: pnpm --filter @ezplayer/integration-tests test

      - name: Upload EZPlayer logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ezplayer-logs
          path: /tmp/ezp-udd-*/ezplayer.log
          if-no-files-found: ignore
