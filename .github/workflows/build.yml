name: Build Check

on:
    pull_request:
        branches:
            - main
            - master
            - production
            - develop

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-2022, macos-latest]

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            # Use Python 3.11 to satisfy node-gyp/gyp's distutils import
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.11'

            - name: Set Python for node-gyp (unix)
              if: matrix.os != 'windows-2022'
              run: |
                  python --version
                  echo "PYTHON=$(which python)" >> $GITHUB_ENV

            - name: Set Python for node-gyp (windows)
              if: matrix.os == 'windows-2022'
              run: |
                  python --version
                  echo "PYTHON=$(where python | head -1)" >> $GITHUB_ENV

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Set up CI
              uses: pnpm/action-setup@v5
              with:
                  version: 10
                  run_install: false
                  cache: true

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build project
              run: pnpm run build
