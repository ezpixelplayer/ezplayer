name: Unit Tests

on:
    pull_request:
        branches:
            - main
            - master
            - production
            - develop
    push:
        branches:
            - main

jobs:
    unit-tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  run_install: false
                  cache: true

            # Install only the pure-TS test packages and their deps, so this job stays
            # fast and never touches the electron app's native (node-gyp) build.
            - name: Install dependencies
              run: pnpm install --frozen-lockfile --filter "@ezplayer/ezplayer-core..." --filter "@ezplayer/epp..."

            - name: Run unit tests
              run: |
                  pnpm --filter @ezplayer/ezplayer-core exec vitest run
                  pnpm --filter @ezplayer/epp exec vitest run
